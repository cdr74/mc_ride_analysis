name: Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # Releases must stay signed with the same debug keystore across versions so
      # installed apps keep upgrading in place (see README "Cut a release").
      # The keystore lives in the repo secret DEBUG_KEYSTORE_BASE64; without it
      # (e.g. fork PRs) the build falls back to the runner's ephemeral debug key,
      # which is fine for verification but must never be released — hence the
      # hard failure on tag builds.
      - name: Restore shared debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::DEBUG_KEYSTORE_BASE64 secret missing — refusing to build a release with an ephemeral signature"
              exit 1
            fi
            echo "No keystore secret (fork PR?) — building with ephemeral debug key"
            exit 0
          fi
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore

      - name: Lint, unit tests, build
        run: ./gradlew lint testDebugUnitTest assembleDebug

      - name: Name APK after versionName
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match versionName $VERSION in app/build.gradle.kts"
            exit 1
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "ridelogger-$VERSION.apk"
          echo "APK=ridelogger-$VERSION.apk" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK }}
          path: ${{ env.APK }}

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$APK" --repo "$GITHUB_REPOSITORY" \
              --title "RideLogger ${GITHUB_REF_NAME#v}" --generate-notes
          fi
