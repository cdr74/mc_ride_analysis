name: Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # Releases must stay signed with the same debug keystore across versions so
      # installed apps keep upgrading in place (see README "Cut a release").
      # The keystore lives in the repo secret DEBUG_KEYSTORE_BASE64; without it
      # (e.g. fork PRs) the build falls back to the runner's ephemeral debug key,
      # which is fine for verification but must never be released — hence the
      # hard failure on tag builds.
      - name: Restore shared debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::DEBUG_KEYSTORE_BASE64 secret missing — refusing to build a release with an ephemeral signature"
              exit 1
            fi
            echo "No keystore secret (fork PR?) — building with ephemeral debug key"
            exit 0
          fi
          # AGP on the runner reads $XDG_CONFIG_HOME/.android (~/.config/.android),
          # not ~/.android — seeding only the latter made CI sign with a fresh
          # ephemeral key (run 29276030082). Seed both locations.
          mkdir -p ~/.android ~/.config/.android
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore
          keytool -list -keystore ~/.android/debug.keystore -storepass android | grep -i sha

      - name: Lint, unit tests, build
        run: ./gradlew lint testDebugUnitTest assembleDebug

      # The whole release scheme depends on every APK carrying the same signature
      # (upgrades must install over previous releases and local installDebug builds).
      # Fail loudly if the built APK is signed with anything else.
      - name: Verify APK signature matches the shared debug key
        env:
          EXPECTED: bf243123403b8445c3b397dab0e4a89aee5c4bf274e98ccab148455366220d67
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          DIGEST=$("$APKSIGNER" verify --print-certs app/build/outputs/apk/debug/app-debug.apk \
            | grep -i 'certificate sha-256 digest' | grep -oE '[0-9a-f]{64}')
          echo "APK cert digest: $DIGEST"
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "No keystore secret — skipping signature check (verification-only build)"
            exit 0
          fi
          if [ "$DIGEST" != "$EXPECTED" ]; then
            echo "::error::APK signature $DIGEST does not match the shared debug key $EXPECTED"
            echo "--- all keystores modified in the last 30 min ---"
            sudo find / -xdev \( -name '*.keystore' -o -name '*.jks' \) -mmin -30 2>/dev/null | while read -r f; do
              echo "== $f"
              keytool -list -keystore "$f" -storepass android 2>/dev/null | grep -i fingerprint || true
            done
            exit 1
          fi

      - name: Name APK after versionName
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match versionName $VERSION in app/build.gradle.kts"
            exit 1
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "ridelogger-$VERSION.apk"
          echo "APK=ridelogger-$VERSION.apk" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK }}
          path: ${{ env.APK }}

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$APK" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$APK" --repo "$GITHUB_REPOSITORY" \
              --title "RideLogger ${GITHUB_REF_NAME#v}" --generate-notes
          fi
